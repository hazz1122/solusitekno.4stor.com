            box-shadow: 15px 15px 0px rgba(255, 0, 204, 0.7);

        .red { background: #ff5f56; }

            line-height: 1;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #ff00cc;
            animation: titlePulse 2s infinite alternate;
        }

        @keyframes titlePulse {
            from { text-shadow: 0 0 5px #00ffff, 0 0 10px #ff00cc; }
            to { text-shadow: 0 0 15px #00ffff, 0 0 30px #ff00cc; }
        }

        /* Power Tag Modern */
        .power-tag {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            font-weight: 700;
            color: #000;
            background: #fff;
            padding: 6px 20px;
            text-transform: uppercase;
            border-radius: 2px;
            display: inline-block;
            margin-bottom: 30px;
            font-family: monospace;
        }

        /* Kotak Pesan Funny */
        .glitch-box {
            background: #111;
            border: 2px solid #333;
            padding: 25px;
            border-radius: 2px;
            margin: 0 auto;
            max-width: 600px;

        .glitch-text {

        .highlight { color: #ff00cc; font-weight: bold; }

        /* Footer Marquee Modern */
        .custom-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #fff;
            color: #000;
            padding: 10px 0;
            font-weight: 800;
            border-top: 3px solid #000;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 100;
        }

        .footer-marquee {

            overflow: hidden;
            display: block;
        }

        .footer-marquee span {
            display: inline-block;
